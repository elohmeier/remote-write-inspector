version: 2

project_name: remote-write-inspector

metadata:
  mod_timestamp: "{{ .CommitTimestamp }}"

before:
  hooks:
    - go mod tidy

builds:
  - id: remote-write-inspector
    main: ./cmd/remote-write-inspector
    binary: remote-write-inspector
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.commit={{ .Commit }} -X main.date={{ .Date }}

  - id: rwi-loadgen
    main: ./cmd/rwi-loadgen
    binary: rwi-loadgen
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.commit={{ .Commit }} -X main.date={{ .Date }}

archives:
  - id: binaries
    ids:
      - remote-write-inspector
      - rwi-loadgen
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

dockers_v2:
  - id: remote-write-inspector
    ids:
      - remote-write-inspector
    dockerfile: Dockerfile.goreleaser
    images:
      - ghcr.io/elohmeier/remote-write-inspector
    tags:
      - "{{ .Tag }}"
      - "{{ .Version }}"
      - latest
    platforms:
      - linux/amd64
      - linux/arm64
    sbom: false
    labels:
      org.opencontainers.image.title: "{{ .ProjectName }}"
      org.opencontainers.image.description: Diagnostic Prometheus remote-write receiver for data-quality troubleshooting.
      org.opencontainers.image.url: https://github.com/elohmeier/remote-write-inspector
      org.opencontainers.image.source: https://github.com/elohmeier/remote-write-inspector
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.created: "{{ .Date }}"
    annotations:
      org.opencontainers.image.title: "{{ .ProjectName }}"
      org.opencontainers.image.description: Diagnostic Prometheus remote-write receiver for data-quality troubleshooting.
      org.opencontainers.image.url: https://github.com/elohmeier/remote-write-inspector
      org.opencontainers.image.source: https://github.com/elohmeier/remote-write-inspector
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.created: "{{ .Date }}"

changelog:
  disable: true

release:
  mode: append
